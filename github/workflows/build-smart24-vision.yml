name: Build SMART24 Vision APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-vision-pilot/**'
      - '.github/workflows/build-smart24-vision.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar APK de teste
        run: gradle -p android-vision-pilot :app:assembleDebug --stacktrace

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: SMART24-Vision-Pilot-APK
          path: android-vision-pilot/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
